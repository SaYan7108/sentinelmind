<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SentinelMind Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    :root {
      --red: #ef4444; --orange: #f97316; --yellow: #eab308;
      --green: #22c55e; --blue: #3b82f6; --purple: #8b5cf6;
      --bg: #0a0e1a; --card: #111827; --border: #1f2937;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SEVERITY_COLOR = {
  CRITICAL: '#ef4444', HIGH: '#f97316', MEDIUM: '#eab308', LOW: '#22c55e'
};

const MOCK_EVENTS = [
  { id: 1, event_id: 'EVT-00001', event_type: 'failed_login', source: '192.168.1.105', severity: 'HIGH', mitre_tactic: 'Credential Access', mitre_technique: 'T1110 - Brute Force', explanation: '47 failed SSH login attempts from the same IP strongly indicates a brute force attack.', action_taken: 'block_ip', action_detail: 'IP 192.168.1.105 blocked via iptables', confidence: 0.95, timestamp: '2024-01-15T14:23:01', reasoning_steps: ['Step 1: 47 failed attempts in 2 minutes is anomalous', 'Step 2: Target is admin account — high value', 'Step 3: Single source IP confirms brute force pattern'] },
  { id: 2, event_id: 'EVT-00002', event_type: 'port_scan', source: '10.0.0.55', severity: 'HIGH', mitre_tactic: 'Reconnaissance', mitre_technique: 'T1046 - Network Service Scanning', explanation: '1024 ports scanned in under 30 seconds — clear network reconnaissance activity.', action_taken: 'block_ip', action_detail: 'IP 10.0.0.55 blocked via iptables', confidence: 0.88, timestamp: '2024-01-15T14:25:30', reasoning_steps: ['Step 1: 1024 ports probed in <30s is automated scanning', 'Step 2: No prior traffic from this IP', 'Step 3: Classic pre-attack reconnaissance pattern'] },
  { id: 3, event_id: 'EVT-00003', event_type: 'data_exfiltration', source: '172.16.0.10', severity: 'CRITICAL', mitre_tactic: 'Exfiltration', mitre_technique: 'T1048 - Exfiltration Over Alt Protocol', explanation: '500MB transferred to unknown external IP — likely sensitive data theft in progress.', action_taken: 'isolate_endpoint', action_detail: 'Host 172.16.0.10 isolated from network', confidence: 0.97, timestamp: '2024-01-15T14:30:00', reasoning_steps: ['Step 1: 500MB outbound to unknown IP is highly unusual', 'Step 2: Destination IP has no prior connection history', 'Step 3: Transfer speed suggests automated exfiltration'] },
  { id: 4, event_id: 'EVT-00004', event_type: 'privilege_escalation', source: 'localhost', severity: 'CRITICAL', mitre_tactic: 'Privilege Escalation', mitre_technique: 'T1548 - Abuse Elevation Control', explanation: 'www-data attempting sudo su - is a classic post-exploitation privilege escalation.', action_taken: 'kill_process', action_detail: 'Process PID 3821 terminated', confidence: 0.96, timestamp: '2024-01-15T14:32:10', reasoning_steps: ['Step 1: www-data should never run sudo commands', 'Step 2: su - with no target user escalates to root', 'Step 3: Likely webshell establishing root access'] },
];

const MOCK_STATS = { total_threats: 4, critical: 2, high: 2, ips_blocked: 2, auto_resolved: 3 };

function StatCard({ label, value, color }) {
  return (
    <div style={{ background: '#111827', border: `1px solid #1f2937`, borderRadius: 12, padding: '20px 24px', flex: 1, minWidth: 140 }}>
      <div style={{ fontSize: 28, fontWeight: 700, color: color || '#e2e8f0' }}>{value}</div>
      <div style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>{label}</div>
    </div>
  );
}

function SeverityBadge({ severity }) {
  return (
    <span style={{ background: SEVERITY_COLOR[severity] + '22', color: SEVERITY_COLOR[severity], border: `1px solid ${SEVERITY_COLOR[severity]}44`, borderRadius: 6, padding: '2px 10px', fontSize: 12, fontWeight: 600 }}>
      {severity}
    </span>
  );
}

function EventRow({ event, onClick, selected }) {
  return (
    <tr onClick={() => onClick(event)} style={{ cursor: 'pointer', background: selected ? '#1f2937' : 'transparent', borderBottom: '1px solid #1f2937' }}>
      <td style={{ padding: '12px 16px', fontSize: 13, color: '#6b7280' }}>{event.event_id}</td>
      <td style={{ padding: '12px 16px', fontSize: 13 }}>{event.event_type.replace('_', ' ').toUpperCase()}</td>
      <td style={{ padding: '12px 16px', fontSize: 13, color: '#93c5fd' }}>{event.source}</td>
      <td style={{ padding: '12px 16px' }}><SeverityBadge severity={event.severity} /></td>
      <td style={{ padding: '12px 16px', fontSize: 13, color: '#a78bfa' }}>{event.mitre_tactic}</td>
      <td style={{ padding: '12px 16px', fontSize: 13, color: '#34d399' }}>{event.action_taken.replace('_', ' ')}</td>
      <td style={{ padding: '12px 16px', fontSize: 12, color: '#6b7280' }}>{event.timestamp.slice(11, 19)}</td>
    </tr>
  );
}

function ReasoningPanel({ event, onClose }) {
  if (!event) return null;
  return (
    <div style={{ background: '#111827', border: '1px solid #1f2937', borderRadius: 12, padding: 24, marginTop: 24 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <h3 style={{ color: '#e2e8f0', fontSize: 16 }}>🧠 AI Reasoning Trace — {event.event_id}</h3>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#6b7280', cursor: 'pointer', fontSize: 18 }}>✕</button>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>MITRE TECHNIQUE</div>
          <div style={{ color: '#a78bfa', fontSize: 14 }}>{event.mitre_technique}</div>
        </div>
        <div>
          <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>CONFIDENCE</div>
          <div style={{ color: '#34d399', fontSize: 14 }}>{(event.confidence * 100).toFixed(0)}%</div>
        </div>
      </div>
      <div style={{ background: '#0a0e1a', borderRadius: 8, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 8 }}>EXPLANATION</div>
        <div style={{ fontSize: 14, color: '#e2e8f0', lineHeight: 1.6 }}>{event.explanation}</div>
      </div>
      <div>
        <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 8 }}>CHAIN-OF-THOUGHT STEPS</div>
        {event.reasoning_steps.map((step, i) => (
          <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 8, alignItems: 'flex-start' }}>
            <span style={{ background: '#3b82f622', color: '#3b82f6', borderRadius: 4, padding: '1px 8px', fontSize: 12, flexShrink: 0 }}>{i + 1}</span>
            <span style={{ fontSize: 13, color: '#d1d5db' }}>{step}</span>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 16, background: '#22c55e11', border: '1px solid #22c55e33', borderRadius: 8, padding: 12 }}>
        <span style={{ fontSize: 12, color: '#22c55e' }}>✅ ACTION TAKEN: </span>
        <span style={{ fontSize: 13, color: '#d1d5db' }}>{event.action_detail}</span>
      </div>
    </div>
  );
}

function App() {
  const [events] = useState(MOCK_EVENTS);
  const [stats] = useState(MOCK_STATS);
  const [selected, setSelected] = useState(null);
  const [pulse, setPulse] = useState(false);

  useEffect(() => {
    const t = setInterval(() => setPulse(p => !p), 1500);
    return () => clearInterval(t);
  }, []);

  return (
    <div style={{ minHeight: '100vh', padding: 24 }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 32 }}>
        <div style={{ fontSize: 32 }}>🛡️</div>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: '#e2e8f0' }}>SentinelMind</h1>
          <div style={{ fontSize: 13, color: '#6b7280' }}>Autonomous Cyber Threat Detection & Response</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: pulse ? '#22c55e' : '#16a34a', transition: 'background 0.3s' }}></div>
          <span style={{ fontSize: 13, color: '#22c55e' }}>Agent Active</span>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: 'flex', gap: 16, marginBottom: 28, flexWrap: 'wrap' }}>
        <StatCard label="Total Threats" value={stats.total_threats} color="#e2e8f0" />
        <StatCard label="Critical" value={stats.critical} color="#ef4444" />
        <StatCard label="High" value={stats.high} color="#f97316" />
        <StatCard label="IPs Blocked" value={stats.ips_blocked} color="#3b82f6" />
        <StatCard label="Auto-Resolved" value={stats.auto_resolved} color="#22c55e" />
      </div>

      {/* Events Table */}
      <div style={{ background: '#111827', border: '1px solid #1f2937', borderRadius: 12, overflow: 'hidden', marginBottom: 24 }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid #1f2937', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 15, fontWeight: 600 }}>⚡ Threat Events</span>
          <span style={{ fontSize: 12, color: '#6b7280', marginLeft: 'auto' }}>Click a row to view AI reasoning</span>
        </div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: '#0a0e1a' }}>
                {['Event ID', 'Type', 'Source', 'Severity', 'MITRE Tactic', 'Action', 'Time'].map(h => (
                  <th key={h} style={{ padding: '10px 16px', fontSize: 11, color: '#6b7280', textAlign: 'left', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {events.map(e => (
                <EventRow key={e.id} event={e} onClick={setSelected} selected={selected?.id === e.id} />
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Reasoning Panel */}
      <ReasoningPanel event={selected} onClose={() => setSelected(null)} />

      <div style={{ textAlign: 'center', marginTop: 32, color: '#374151', fontSize: 12 }}>
        Created by Sayan & Debosmita 
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
